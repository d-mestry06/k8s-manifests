apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: task-manager
spec:
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_DATABASE
          value: taskmanager
        - name: MYSQL_USER
          value: taskmanager
        - name: MYSQL_PASSWORD
          value: taskpass
        - name: MYSQL_ROOT_PASSWORD
          value: rootpass